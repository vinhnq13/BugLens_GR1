services:
  postgres:
    image: postgres:16
    container_name: buglens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: buglens_db
      POSTGRES_USER: buglens
      POSTGRES_PASSWORD: buglens123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U buglens -d buglens_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: buglens_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: buglens_ai_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # No database connection needed — this service is stateless.
      # Add env vars here in Mission 5 if needed (e.g. AI_SECRET_KEY).
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"" ]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:

